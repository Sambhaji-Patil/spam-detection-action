# action.yml
name: Spam Detection Action
description: Detects spam comments using a pre-trained ML model.

inputs:
  github_token:
    description: "GitHub token for authentication"
    required: true
  comment_body:
    description: "Comment text to check"
    required: true

outputs:
  is_spam:
    description: "JSON string indicating if comment is spam"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: pip install -r requirements.txt

    - id: spam_detection
      run: |
        result=$(python detect_spam.py "${{ inputs.comment_body }}")
        echo "is_spam=${result}" >> ${GITHUB_OUTPUT}
      shell: bash
