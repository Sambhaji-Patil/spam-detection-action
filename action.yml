# action.yml
name: Spam Detection Action
description: Detects spam comments using a pre-trained ML model.

inputs:
  github_token:
    description: "GitHub token for authentication"
    required: true
  comment_body:
    description: "Comment text to check"
    required: true

outputs:
  is_spam:
    description: "Boolean indicating if comment is spam"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # or any version that supports your model

    - name: Install dependencies
      shell: bash
      run: pip install -r requirements.txt

    - name: Run spam detection
      id: spam_detection
      shell: bash
      run: python detect_spam.py "${{ inputs.comment_body }}"
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        
    - name: Process result
      id: check_spam
      shell: bash
      run: |
        echo "is_spam=$(python -c 'import sys, json; print(json.load(sys.stdin)["is_spam"])')" >> $GITHUB_OUTPUT
      env:
        INPUT_JSON: ${{ steps.spam_detection.outputs.result }}
